<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Ledger — City Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--card:#141414;--ink:#f5f5f5;--dim:rgba(255,255,255,.4);
  --accent:#ff6b35;--accent2:#ffd23f;--green:#00c853;--rule:rgba(255,255,255,.08)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;
  -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(circle at 80% 10%,rgba(255,107,53,.06),transparent 40%),
    radial-gradient(circle at 10% 90%,rgba(255,210,63,.04),transparent 40%)}
.shell{max-width:1200px;margin:0 auto;padding:40px 48px}

.top{display:flex;justify-content:space-between;align-items:center;padding-bottom:20px;
  border-bottom:1px solid var(--rule);margin-bottom:40px}
.top .brand{font-size:14px;font-weight:700}.top .brand em{color:var(--accent);font-style:normal}
.top .live{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.top .live .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.hero{text-align:center;padding:40px 0 48px;border-bottom:1px solid var(--rule);margin-bottom:40px}
.hero .label{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.hero .amount{font-size:clamp(56px,10vw,120px);font-weight:800;letter-spacing:-.04em;
  color:var(--accent2);transition:all .3s}.hero .amount.bump{transform:scale(1.04);
  text-shadow:0 0 60px rgba(255,210,63,.3)}
.hero .sub{font-size:13px;color:var(--dim);margin-top:8px}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--rule);
  border-radius:12px;margin-bottom:40px;overflow:hidden}
.stat{padding:24px;text-align:center;border-right:1px solid var(--rule)}
.stat:last-child{border-right:none}
.stat .label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.stat .value{font-size:32px;font-weight:800}
.stat .value.green{color:var(--green)}.stat .value.orange{color:var(--accent)}.stat .value.yellow{color:var(--accent2)}

.merchants{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:40px}
.m-card{background:var(--card);border:1px solid var(--rule);border-radius:12px;padding:20px;
  position:relative;transition:border-color .3s}
.m-card.flash{border-color:var(--accent2)}
.m-card .dot{position:absolute;top:14px;right:14px;width:8px;height:8px;border-radius:50%;
  background:var(--green);animation:pulse 1.4s infinite}
.m-card .name{font-size:18px;font-weight:700;margin-bottom:2px}
.m-card .area{font-size:11px;color:var(--dim);margin-bottom:12px}
.m-card .meter{height:6px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-bottom:12px}
.m-card .meter .fill{height:100%;background:var(--accent);border-radius:99px;transition:width .5s}
.m-card .row{display:flex;justify-content:space-between}
.m-card .s-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.m-card .s-value{font-size:22px;font-weight:800}

.feed{border:1px solid var(--rule);border-radius:12px;max-height:260px;overflow-y:auto}
.feed-item{padding:12px 20px;border-bottom:1px solid var(--rule);display:flex;
  justify-content:space-between;align-items:center;font-size:13px;animation:slideIn .3s}
.feed-item:last-child{border-bottom:none}
.feed-item .badge{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:3px 8px;border-radius:4px}
.badge.redeem{background:rgba(255,107,53,.15);color:var(--accent)}
.badge.optin{background:rgba(255,210,63,.1);color:var(--accent2)}
.badge.gen{background:rgba(0,200,83,.1);color:var(--green)}
.feed-item .time{font-family:monospace;font-size:11px;color:var(--dim)}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--rule);
  display:flex;justify-content:space-between;font-size:10px;color:var(--dim);
  letter-spacing:.06em;text-transform:uppercase}

@media(max-width:900px){.merchants{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="brand"><em>City</em> Wallet · Live Ledger</div>
    <div class="live"><div class="dot"></div> <span id="liveLabel">CONNECTING</span></div>
  </div>

  <div class="hero">
    <div class="label">Total revenue · live</div>
    <div class="amount" id="heroAmount">€0.00</div>
    <div class="sub" id="heroSub">Waiting for data...</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="label">Merchants</div><div class="value green" id="sMerchants">0</div></div>
    <div class="stat"><div class="label">Walk-ins</div><div class="value orange" id="sWalkins">0</div></div>
    <div class="stat"><div class="label">Opt-ins</div><div class="value yellow" id="sOptins">0</div></div>
    <div class="stat"><div class="label">Offers generated</div><div class="value" id="sGenerated">0</div></div>
  </div>

  <div class="merchants" id="merchantsGrid"></div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em">Activity Feed</span>
    <span style="font-size:11px;color:var(--dim)" id="feedCount">0 events</span>
  </div>
  <div class="feed" id="feed"><div class="feed-item" style="color:var(--dim);justify-content:center">Waiting...</div></div>

  <div class="footer">
    <span>City Wallet · Project Real</span>
    <span id="clock">--:--:--</span>
    <span>HackNation 2026</span>
  </div>
</div>

<script>
const API=window.location.origin;
let feedItems=[];
let lastRev=0;

setInterval(()=>{const n=new Date();document.getElementById('clock').textContent=
  n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+
  n.getSeconds().toString().padStart(2,'0')},1000);

async function poll(){
  try{
    const resp=await fetch(API+'/api/ledger');
    const d=await resp.json();
    const heroEl=document.getElementById('heroAmount');
    heroEl.textContent='€'+d.total_revenue.toFixed(2);
    if(d.total_revenue>lastRev){heroEl.classList.add('bump');setTimeout(()=>heroEl.classList.remove('bump'),400)}
    lastRev=d.total_revenue;
    document.getElementById('heroSub').textContent=
      `${d.merchants.length} merchants · ${d.total_walkins} walk-ins · ${d.total_optins} opt-ins · `+
      new Date().toLocaleTimeString();
    document.getElementById('sMerchants').textContent=d.merchants.length;
    document.getElementById('sWalkins').textContent=d.total_walkins;
    document.getElementById('sOptins').textContent=d.total_optins;
    document.getElementById('sGenerated').textContent=d.generated_offers_count;
    const maxW=Math.max(...d.merchants.map(m=>m.walk_ins),1);
    document.getElementById('merchantsGrid').innerHTML=d.merchants.map(m=>`
      <div class="m-card" id="mc-${m.id}">
        <div class="dot"></div>
        <div class="name">${m.name}</div>
        <div class="area">${m.area} · Payone: ${m.payone.current_tx}/${m.payone.avg_hourly_tx} tx/hr</div>
        <div class="meter"><div class="fill" style="width:${m.walk_ins/maxW*100}%"></div></div>
        <div class="row">
          <div><div class="s-label">Walk-ins</div><div class="s-value">${m.walk_ins}</div></div>
          <div><div class="s-label">Revenue</div><div class="s-value" style="color:var(--accent)">€${m.revenue.toFixed(0)}</div></div>
        </div>
      </div>`).join('');
    document.getElementById('liveLabel').textContent='LIVE';
    document.getElementById('feedCount').textContent=feedItems.length+' events';
  }catch(e){document.getElementById('liveLabel').textContent='RECONNECTING'}
}

function addFeed(type,text,time){
  feedItems.unshift({type,text,time});
  if(feedItems.length>30)feedItems.pop();
  document.getElementById('feed').innerHTML=feedItems.map(f=>`
    <div class="feed-item">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge ${f.type}">${f.type}</span><span>${f.text}</span>
      </div>
      <span class="time">${f.time}</span>
    </div>`).join('');
}

poll();
setInterval(poll,3000);
</script>
</body>
</html>
