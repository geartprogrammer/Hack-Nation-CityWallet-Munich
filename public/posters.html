<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Posters - Munich Markt</title>
<style>
  :root { --bg: #f6f5f1; --ink: #14140f; --copper: #b85c2b; --dim: #76746b; --rule: #e2dfd6; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--ink); padding: 32px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .sub { font-size: 15px; color: var(--dim); margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  .card {
    background: #fff; border: 1px solid var(--rule); border-radius: 12px;
    padding: 24px; text-align: center;
  }
  .card .name { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  .card .area { font-size: 13px; color: var(--dim); margin-bottom: 12px; }
  .card .offer { font-size: 18px; font-weight: 700; color: var(--copper); margin-bottom: 16px; }
  .card img { width: 180px; height: 180px; margin-bottom: 12px; }
  .card .url { font-family: monospace; font-size: 11px; color: var(--dim); word-break: break-all; margin-bottom: 16px; }
  .btns { display: flex; gap: 8px; justify-content: center; }
  .btns a, .btns button {
    padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
    text-decoration: none; border: none; cursor: pointer;
  }
  .btn-poster { background: var(--ink); color: #fff; }
  .btn-qr { background: var(--copper); color: #fff; }
  .btn-print { background: var(--rule); color: var(--ink); }
</style>
</head>
<body>

<h1>QR Posters</h1>
<p class="sub">Print these and put them at cafe entrances, U-Bahn exits, and Marienplatz. Each QR leads directly to the wallet pass for that merchant.</p>

<div class="grid" id="grid"></div>

<script>
  const baseUrl = window.location.origin;

  async function load() {
    const resp = await fetch('/api/catalog');
    const catalog = await resp.json();
    const grid = document.getElementById('grid');

    grid.innerHTML = catalog.map(m => {
      const passUrl = `${baseUrl}/pass/${m.id}`;
      return `
        <div class="card">
          <div class="name">${m.name}</div>
          <div class="area">${m.area}</div>
          <div class="offer">EUR ${m.offer_value.toFixed(2)} off — ${m.offer_text}</div>
          <img src="/qr/svg?merchant=${m.id}" alt="QR for ${m.name}">
          <div class="url">${passUrl}</div>
          <div class="btns">
            <a href="/poster/${m.id}" class="btn-poster">Full poster</a>
            <a href="/qr/png?merchant=${m.id}" download="qr-${m.id}.png" class="btn-qr">Download PNG</a>
          </div>
        </div>
      `;
    }).join('');
  }

  load();
</script>
</body>
</html>
